<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manorama's Magic ✨</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff4da6">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="stars"></canvas>

<div id="app">

<!-- PAGE 1: LANDING -->
<section class="page active" id="p1">
  <h1 class="title">✨ Welcome to Manorama’s Universe ✨</h1>
  <div id="balloon-container"></div>
  <button onclick="go(2)">Start Magic</button>
</section>

<!-- PAGE 2: CAKE & CANDLE -->
<section class="page" id="p2">
  <h2>Make a Wish 🎂</h2>
  <div id="cake" onclick="sliceCake()">🎂</div>
  <div id="flame">🔥</div>
  <button onclick="blow()">Blow Candle</button>

  <div class="slider">
    <img src="Cake.jpg">
    <img src="HappyBirthdayImage.png">
    <img src="GiftBox.png">
  </div>

  <audio id="bgmusic" src="music.mp3" autoplay loop></audio>
  <button onclick="go(3)">Next</button>
</section>

<!-- PAGE 3: FIREWORKS -->
<section class="page" id="p3">
  <canvas id="fw"></canvas>
  <h1 class="msg">Happy Birthday Manorama 💖</h1>
  <button onclick="go(4)">Next</button>
</section>

<!-- PAGE 4: GIFT -->
<section class="page" id="p4">
  <div id="gift">🎁</div>
  <button id="yes" onclick="yes()">YES 💖</button>
  <button id="no" onclick="no()">NO 😜</button>
</section>

<!-- PAGE 5: MINI-GAME -->
<section class="page" id="p5">
  <div id="game"></div>
  <div class="ui">
    Score: <span id="s">0</span> |
    Time: <span id="t">20</span>
  </div>
</section>

<!-- FINAL MESSAGE -->
<div id="final"></div>

</div>

<script src="script.js"></script>

<script>
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
